name: fast

# P0.0 — fast CI workflow. Target ≤5 minutes wall-clock.
# Runs on every push + every PR. Catches the structural-invariant violations
# (induction-surfaces-invariant-gaps, paired-write tuples, RULES ordering,
# BEGIN IMMEDIATE, etc.) that were architect-advisory before P0.0.
#
# Excludes:
#   - `@pytest.mark.slow`    — heavy-model tests (pyannote, SpeechBrain, …)
#   - `@pytest.mark.network` — live Together.ai / Tavily calls
#   - `@pytest.mark.models`  — HF model download tests
# Run those in slow.yml (nightly + manual).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # hard cap; spec target ≤5 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dev tooling + deps
        run: |
          python -m pip install --upgrade pip
          # Lint/type tools first — needed even if requirements install is slow.
          pip install ruff mypy
          # Project deps. Use CPU-only torch wheel to avoid the cu128 timeout
          # in CI (dev machines pin GPU torch; CI doesn't need it because
          # `not slow and not models` excludes every test that touches a GPU
          # codepath).
          pip install --index-url https://download.pytorch.org/whl/cpu \
            torch torchvision torchaudio || true
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .
        # Format check failures are informational on first rollout — don't
        # block CI until repo-wide format pass lands separately.
        continue-on-error: true

      - name: Mypy (permissive — allow-list mode)
        # P0.0 starts mypy in informational mode. Tighten in a follow-up PR
        # once the type-error baseline is captured. Per the
        # "spec-first review cycle" discipline, a full strict mypy pass is
        # a multi-day spec on its own.
        run: mypy core/ --ignore-missing-imports --no-strict-optional || true

      - name: Pytest — fast subset (excludes privacy_critical)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/ \
            -m "not slow and not network and not models and not privacy_critical" \
            --maxfail=5 \
            -q

      - name: Pytest — privacy_critical (strict, fail-on-skip)
        # P0.S7 D3 — dedicated CI step for cross-person privacy regression.
        # `--strict-markers` rejects unknown markers (catches typos like
        # `privacy_crit`). `-W error::pytest.PytestUnknownMarkWarning`
        # promotes the related warning class to errors. `-rs` reports
        # SKIPPED tests in the short summary; the post-pytest grep + exit 1
        # treats any skipped privacy_critical test as a FAILURE (skip
        # silently dropping a privacy test is the exact drift class P0.S7
        # is meant to prevent).
        # Spec: tests/p0_s7_privacy_critical_plan_v1.md §2.
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          pytest tests/ \
            -m privacy_critical \
            --strict-markers \
            -W error::pytest.PytestUnknownMarkWarning \
            -rs \
            --tb=short \
            | tee /tmp/privacy_critical_output.txt
          if grep -q "^SKIPPED" /tmp/privacy_critical_output.txt; then
            echo "::error::Privacy-critical test was SKIPPED — this is a P0.S7 invariant violation"
            grep "^SKIPPED" /tmp/privacy_critical_output.txt
            exit 1
          fi
