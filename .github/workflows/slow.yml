name: slow

# P0.0 — nightly + manual full-suite workflow. Runs the heavy-model tests
# (pyannote, SpeechBrain, Whisper, ECAPA-TDNN, Kokoro) + network tests
# (Together.ai / Tavily — opt-in via secret), and caches HF model downloads
# so subsequent nightly runs stay fast.
#
# SB.7 additions (2026-07-02):
#   - Step 8 (coverage floor): the full-suite pytest step carries
#     PYTEST_ADDOPTS with --cov over core.vision + core.voice +
#     core.reconciler and --cov-fail-under — the board "coverage threshold".
#   - Step 7 (D4/D5): the perception-bench job below runs a
#     [companion, robotics] profile matrix — boot check (A7) + the D3
#     regression gate (`python -m bench.perception --alert`).
#
# Triggers:
#   - schedule: every night at 03:30 UTC
#   - workflow_dispatch: manual trigger from the Actions tab

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: slow-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 60         # full-suite + model downloads can be slow

    steps:
      - name: Checkout (with LFS for ONNX/anti-spoof binary models)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache HuggingFace model artifacts
        # Whisper, pyannote, SpeechBrain ECAPA-TDNN, E5 — all live under
        # ~/.cache/huggingface. Caching here avoids the ~5-minute model
        # download on every nightly. Keyed on requirements.txt because
        # version bumps may invalidate cached artifacts.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/speechbrain
            pretrained_models
          key: hf-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch — nightly CI doesn't have GPU.
          pip install --index-url https://download.pytorch.org/whl/cpu \
            torch torchvision torchaudio || true
          pip install -r requirements.txt

      - name: Pytest — full suite (slow + models + network)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          # Live API calls — only fire when secrets are present (forks won't
          # have them, so network tests skip silently in untrusted contexts).
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # SB.7 Step 8 — coverage floor on the perception-core files (the
          # board "coverage threshold"). Floor derivation (2026-07-02, at
          # Step-8 landing): full-suite local measurement = reconciler 100% /
          # vision 45% / voice 51% → aggregate 57%; floor = 50 (measured
          # minus a 7pt cross-platform margin — CI skips CUDA-gated tests and
          # runs the model-import tests dev boxes skip, so per-file numbers
          # shift a few points either way). Ratchet UPWARD once the first
          # nightly reading establishes the CI-side number; never below 50.
          PYTEST_ADDOPTS: >-
            --cov=core.vision --cov=core.voice --cov=core.reconciler
            --cov-report=term --cov-fail-under=50
        run: |
          # SB.7 Step 8 — the coverage floor rides PYTEST_ADDOPTS so BOTH
          # branches (with/without network) enforce it without duplication.
          if [ -n "$TOGETHER_API_KEY" ]; then
            echo "Running full suite with --run-network"
            pytest tests/ --run-network -q
          else
            echo "TOGETHER_API_KEY not set — running full suite without network tests"
            # The web_search client-side-validation tests mock _tavily_http.post
            # but core.brain._web_search early-returns None when TAVILY_API_KEY is
            # falsy — so give them a placeholder ONLY on this no-network branch
            # (the --run-network branch above keeps the real secret; no real Tavily
            # request is made here because those tests mock the HTTP client).
            export TAVILY_API_KEY="${TAVILY_API_KEY:-ci-placeholder-not-a-real-key}"
            pytest tests/ -q
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # SB.7 Step 7 (D4/D5) — per-profile matrix over the SB.2 deployment shapes.
  # Each leg boots one profile (KARAOS_PROFILE), proves ONLY that profile's
  # agent set loads (A7 — tests/test_sb7_profile_matrix.py, extending the SB.3
  # registry battery into the matrix shape), then runs the perception bench's
  # D3 regression gate against the committed baseline. store_kiosk deferred
  # per D4 (not built). No LFS checkout: the bench reads only the committed
  # synthetic .npz (a regular git object) — no ONNX/model binaries load in
  # this job, and skipping LFS keeps the two nightly legs off the LFS
  # bandwidth quota.
  # ───────────────────────────────────────────────────────────────────────────
  perception-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false            # one profile's regression must not mask the other's result
      matrix:
        profile: [companion, robotics]
    env:
      KARAOS_PROFILE: ${{ matrix.profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch — this job has no GPU (matches the slow job).
          pip install --index-url https://download.pytorch.org/whl/cpu \
            torch torchvision torchaudio || true
          pip install -r requirements.txt

      - name: Profile boot check (A7 — only this profile's agent set loads)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: pytest tests/test_sb7_profile_matrix.py -q

      - name: Perception bench — D3 regression gate vs committed baseline
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: python -m bench.perception --alert
