[pytest]
asyncio_mode = auto
markers =
    network: test depends on a live Together.ai / Ollama / Tavily call; skipped by default. Use `pytest --run-network` to include.
    slow: tests that load heavy models (pyannote, SpeechBrain, Whisper, ECAPA, Kokoro) OR run crash-injection / boot-reconciliation cycles (P0.5 / P0.X). Fast CI excludes via `-m "not slow"`; nightly CI includes.
    models: test triggers a HuggingFace / TensorRT / ONNX model download on first call (pyannote checkpoint, SpeechBrain ECAPA-TDNN, Whisper, E5 embedder). Often also `slow`. Fast CI excludes via `-m "not models"`; nightly CI includes (cached via actions/cache).
    privacy_critical: cross-person privacy regression. CI runs as dedicated step with `--strict-markers -W error::pytest.PytestUnknownMarkWarning -rs --tb=short` + fail-on-skip detection. Spec: rule book/cycle-specs/p0_s7_privacy_critical_plan_v1.md. Tagged via module-level `pytestmark` (single-purpose privacy test files) OR class-level decorator (TestPrivacyFilter / TestBrainDBQueryKnowledgeFor / TestPrivacyIsolationE2E / TestVisitorAlert) OR function-level decorator (mixed-purpose files). Drift protection via tests/test_p0_s7_privacy_critical.py AST tripwires.
    real_voice: test exercises the REAL core.voice module past the conftest stub, via the shared `real_voice` fixture (tests/conftest.py). Skips cleanly when the real ECAPA model isn't available (speechbrain + CUDA — the fixture's skip gate is ECAPA-specific). The fixture's `_load_ecapa_patched` assert is the vacuity guard (#125/#126) — it can't silently fall back to the stub. Grep-discoverable + `-m real_voice` selectable. Spec: tests/followup126_real_voice_vacuity_guard_spec.md.
