[pytest]
asyncio_mode = auto
markers =
    network: test depends on a live Together.ai / Ollama / Tavily call; skipped by default. Use `pytest --run-network` to include.
    slow: tests that load heavy models (pyannote, SpeechBrain, Whisper, ECAPA, Kokoro) OR run crash-injection / boot-reconciliation cycles (P0.5 / P0.X). Fast CI excludes via `-m "not slow"`; nightly CI includes.
    models: test triggers a HuggingFace / TensorRT / ONNX model download on first call (pyannote checkpoint, SpeechBrain ECAPA-TDNN, Whisper, E5 embedder). Often also `slow`. Fast CI excludes via `-m "not models"`; nightly CI includes (cached via actions/cache).
    privacy_critical: cross-person privacy regression. CI runs as dedicated step with `--strict-markers -W error::pytest.PytestUnknownMarkWarning -rs --tb=short` + fail-on-skip detection. Spec: tests/p0_s7_privacy_critical_plan_v1.md. Tagged via module-level `pytestmark` (single-purpose privacy test files) OR class-level decorator (TestPrivacyFilter / TestBrainDBQueryKnowledgeFor / TestPrivacyIsolationE2E / TestVisitorAlert) OR function-level decorator (mixed-purpose files). Drift protection via tests/test_p0_s7_privacy_critical.py AST tripwires.
