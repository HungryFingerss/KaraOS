#
# SB.2.1 — the companion profile. EXACT == today's config (golden-snapshot-
# guarded by T1). Only AXIS values live here; universal constants stay in
# core/config.py, so a base tweak to a non-axis constant doesn't touch this file.
# apply(companion) re-applies these at the LEAF == base → byte-identical →
# zero behavior change.
profile: companion
llm:        { provider: cloud }                  # → today's Together-70B leaves
features:   { emotion: true, tier_memory: true } # the 2 real-flag-backed toggles (= current values)
agents:     companion                            # SB.3: the full 15-agent set (= today; behavior-neutral)
blocks:     companion                            # SB.4.1: the full 27-block set (= today; behavior-neutral)
persona:    { persona_id: companion_dog }        # SB.8: reference-only — selects persona/companion_dog.yaml (the pack is the single source for name/voice/flavor; the old decorative system_name was never consumed and would clobber DEFAULT_SYSTEM_NAME='Dog' if applied)
hardware:   { tier: dev_laptop }                 # declared-only hook (today's loadout)
identity:   { enrollment_mode: persistent, retention_mode: durable }  # SB.5: == today; T1 byte-neutral. env KARAOS_INSTANCE_MODE stays the separate instance axis
